spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: bediary-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/bediary_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:nnnnnnnnnn0}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

bediary:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
  auth:
    refresh-token:
      cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:bediary_refresh_token}
      expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:2592000000}
      # Set REFRESH_COOKIE_SECURE=true in production HTTPS. Keep false for localhost/mobile LAN over http.
      cookie-secure: ${REFRESH_COOKIE_SECURE:false}
  upload-dir: ${UPLOAD_DIR:uploads}
  base-url: ${BASE_URL:http://localhost:8080/api/v1}

logging:
  level:
    com.bediary: DEBUG
    org.springframework.security: DEBUG

groq:
  api-key: ${GROQ_API_KEY:}
  api-url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
  vision-model: ${GROQ_VISION_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
  chat-model: ${GROQ_CHAT_MODEL:llama-3.3-70b-versatile}

supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    bucket: ${SUPABASE_STORAGE_BUCKET:bediary-media}
    signed-url-ttl-seconds: ${SUPABASE_SIGNED_URL_TTL_SECONDS:900}
